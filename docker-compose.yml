version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: faraday_postgres
    restart: always
    environment:
      POSTGRES_USER: faraday
      POSTGRES_PASSWORD: faraday_password
      POSTGRES_DB: faraday_basketball
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - faraday_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: faraday_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@faraday.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - postgres
    networks:
      - faraday_network

volumes:
  postgres_data:

networks:
  faraday_network:
    driver: bridge
